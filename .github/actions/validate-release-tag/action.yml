name: "validate-release-tag"
description: Validates that the git tag matches the version in pyproject.toml
inputs:
  tag:
    description: Git tag to validate (e.g., from github.ref_name)
    required: true
  strip-v-prefix:
    description: Whether to strip "v" prefix from tag before comparison
    required: false
    default: 'true'
outputs:
  version:
    description: The validated version string from pyproject.toml
    value: ${{ steps.validate.outputs.version }}
  is-prerelease:
    description: Whether this is a pre-release version (dev, rc, alpha, beta)
    value: ${{ steps.validate.outputs.is_prerelease }}
runs:
  using: 'composite'
  steps:
    - name: Validate tag against pyproject.toml
      id: validate
      shell: bash
      run: |
        python "${{ github.action_path }}/validate.py" \
          --tag "${{ inputs.tag }}" \
          ${{ inputs.strip-v-prefix == 'true' && '--strip-v-prefix' || '' }}
