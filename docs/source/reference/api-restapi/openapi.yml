      x-codegen-request-body-name: payload
  /api/v1/artifacts/{id}/contents:
    get:
      tags:
      - Artifacts
      summary: Downloads the contents of an Artifact resource
      description: |-
        Args:
            id: the resource id of the artifact

        Returns:
            A list of the files associated with artifact.
      operationId: get_artifact_id_contents_endpoint
      parameters:
      - name: id
        in: path
        description: ID for the Artifact resource.
        required: true
        schema:
          type: integer
      - name: path
        in: query
        description: Path of a specific artifact. Only valid if artifactis a directory.
        schema:
          type: string
      - name: fileType
        in: query
        description: "Only valid if the artifact is a directory. The type of file\
          \ todownload: tar_gz or zip."
        schema:
          type: string
      - name: X-Fields
        in: header
        description: An optional fields mask
        schema:
          type: string
          format: mask
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArtifactFile-dump'
