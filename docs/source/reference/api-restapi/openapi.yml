openapi: 3.0.1
info:
  title: Dioptra REST API
  version: 1.1.0
servers:
- url: /
tags:
- name: Authentication
  description: Authentication endpoint
- name: Artifacts
  description: Artifacts endpoint
- name: Entrypoints
  description: Entrypoints endpoint
- name: Experiments
  description: Experiments endpoint
- name: Groups
  description: Groups endpoint
- name: Job
  description: Job endpoint
- name: Models
  description: Models endpoint
- name: PluginParameterTypes
  description: Plugin Parameter Types endpoint
- name: Plugins
  description: Plugins endpoint
- name: Queues
  description: Queues endpoint
- name: Tags
  description: Tags endpoint
- name: Users
  description: Users endpoint
- name: Workflows
  description: Workflows endpoint
paths:
  /api/v1/artifacts/:
    get:
      tags:
      - Artifacts
      summary: Gets a list of all Artifact resources
      operationId: get_artifact_endpoint
      parameters:
      - name: sortBy
        in: query
        description: The name of the column to sort.
        schema:
          type: string
      - name: descending
        in: query
        description: Boolean indicating whether to sort by descending or not.
        schema:
          type: boolean
      - name: search
        in: query
        description: Search terms for the query (* and ? wildcards).
        schema:
          type: string
      - name: groupId
        in: query
        description: Filter results by the Group ID.
        schema:
          type: integer
      - name: index
        in: query
        description: Starting index of the current page.
        schema:
          type: integer
      - name: pageLength
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: outputParams
        in: query
        description: Ordered List of Plugin Task Parameter Ids of the output values
          produced by the ArtifactTask associated with the target Artifacts.
        schema:
          type: string
      - name: X-Fields
        in: header
        description: An optional fields mask
        schema:
          type: string
          format: mask
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactPage'
    post:
      tags:
      - Artifacts
      summary: Creates an Artifact resource
      operationId: post_artifact_endpoint
      parameters:
      - name: X-Fields
        in: header
        description: An optional fields mask
        schema:
          type: string
          format: mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Artifact-load'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact-dump'
      x-codegen-request-body-name: payload
  /api/v1/artifacts/{id}:
    get:
      tags:
      - Artifacts
      summary: Gets an Artifact resource
      operationId: get_artifact_id_endpoint
      parameters:
      - name: id
        in: path
        description: ID for the Artifact resource.
        required: true
        schema:
          type: integer
      - name: X-Fields
        in: header
        description: An optional fields mask
